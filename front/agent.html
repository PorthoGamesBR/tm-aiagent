<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ops Agent — Painel de Controle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="agent-styles.css">
<script src="agent-script.js" defer></script>
</head>
<body>

<!-- ── SIDEBAR ── -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">Ops Agent</div>
    <div class="sidebar-sub">Plataforma de governança</div>
  </div>

  <div id="identity-section">
    <div id="identity-label">Usuário ativo</div>
    <div id="identity-display">
      <div class="avatar" id="user-avatar">--</div>
      <span id="identity-name">—</span>
      <button id="change-user-btn" title="Trocar usuário">↩</button>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Agente</div>

    <div class="agent-item" id="agent2-item">
      <div class="agent-dot dot-locked" id="agent2-dot"></div>
      <span class="agent-name dimmed" id="agent2-name">Gerente Operacional</span>
      <span class="agent-badge badge-locked" id="agent2-badge">bloqueado</span>
    </div>
  </div>

  <button id="new-chat-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    Novo chat
  </button>

  <div id="chat-list"></div>
</div>

<!-- ── MAIN ── -->
<div id="main">
  <div id="topbar">
    <span id="chat-title">Selecione ou inicie um chat</span>
    <span id="chat-tag" class="topbar-tag" style="display:none;"></span>
    <span id="context-status" class="context-status ctx-missing" style="display:none;"></span>
  </div>

  <div id="config-notice" class="hidden">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>Configure a chave da API do Groq em <code style="background:#FEF3C7;padding:1px 4px;border-radius:3px;">GROQ_API_KEY</code> no topo do script antes de usar.</span>
  </div>

  <div id="messages">
    <div id="empty-state">
      <div class="es-icon">
        <svg width="22" height="22" fill="none" stroke="#94A3B8" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <p id="empty-title">Nenhum chat aberto</p>
      <span id="empty-sub">Clique em "Novo chat" para começar.</span>
    </div>
  </div>

  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Digite sua mensagem…" disabled></textarea>
    <button id="send-btn" disabled aria-label="Enviar">
      <svg width="16" height="16" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

</body>
</html>
